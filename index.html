<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>GCStreamer Live</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e8542a;
      --bg: #0a0a0a;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --focus-ring: 3px solid #e8542a;
      --ctrl-size: clamp(48px, 7vw, 72px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(8px, 2vw, 16px) clamp(12px, 3vw, 32px);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: clamp(16px, 2.5vw, 22px);
      letter-spacing: -0.3px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    #status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: clamp(12px, 1.8vw, 14px);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.3s ease;
    }

    #status-badge.live { border-color: #e8542a44; background: #e8542a18; color: var(--accent); }
    #status-badge.error { border-color: #ff444444; background: #ff444418; color: #ff6666; }
    #status-badge.loading { border-color: #3388ff44; background: #3388ff18; color: #66aaff; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    #status-badge.live .status-dot { animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Video area ── */
    #video-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Overlay shown when not playing */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #000000cc;
      backdrop-filter: blur(4px);
      transition: opacity 0.4s ease;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-icon {
      width: clamp(56px, 8vw, 88px);
      height: clamp(56px, 8vw, 88px);
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay-icon svg { width: 40%; height: 40%; fill: #fff; }

    #overlay-msg {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 600;
      text-align: center;
      max-width: 500px;
      padding: 0 20px;
    }

    #overlay-sub {
      font-size: clamp(13px, 1.8vw, 16px);
      color: var(--muted);
      text-align: center;
      max-width: 460px;
      padding: 0 20px;
    }

    /* ── Controls bar ── */
    #controls {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: clamp(10px, 2vw, 18px) clamp(12px, 3vw, 32px);
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vw, 20px);
      flex-wrap: wrap;
    }

    .ctrl-btn {
      width: var(--ctrl-size);
      height: var(--ctrl-size);
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn svg { width: 44%; height: 44%; fill: currentColor; }

    .ctrl-btn:hover { background: #222; border-color: #444; }
    .ctrl-btn:active { transform: scale(0.93); }
    .ctrl-btn:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }

    .ctrl-btn.primary { background: var(--accent); border-color: var(--accent); }
    .ctrl-btn.primary:hover { background: #c94420; }

    /* Volume group */
    #vol-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    #vol-icon { flex-shrink: 0; }

    #vol-slider {
      flex: 1;
      min-width: 80px;
      max-width: 200px;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      border-radius: 999px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: clamp(18px, 3vw, 24px);
      height: clamp(18px, 3vw, 24px);
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      transition: transform 0.15s;
    }

    #vol-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    #vol-slider:focus-visible { outline: var(--focus-ring); outline-offset: 4px; border-radius: 999px; }

    /* URL bar */
    #url-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 2;
      min-width: 180px;
    }

    #stream-url {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: clamp(12px, 1.6vw, 14px);
      padding: 0 14px;
      height: var(--ctrl-size);
      outline: none;
      min-width: 0;
    }

    #stream-url:focus { border-color: var(--accent); }
    #stream-url::placeholder { color: var(--muted); }

    /* Spacer */
    .spacer { flex: 1; }

    /* ── Stream URL setup screen ── */
    #setup-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: clamp(24px, 5vw, 64px);
      z-index: 100;
    }

    #setup-screen.hidden { display: none; }

    .setup-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .setup-sub {
      font-size: clamp(14px, 2vw, 18px);
      color: var(--muted);
      text-align: center;
      max-width: 500px;
    }

    #setup-url-input {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: clamp(14px, 2vw, 18px);
      padding: 18px 20px;
      outline: none;
      text-align: center;
    }

    #setup-url-input:focus { border-color: var(--accent); }
    #setup-url-input::placeholder { color: var(--muted); }

    #setup-go {
      width: 100%;
      max-width: 560px;
      height: clamp(52px, 7vw, 68px);
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: clamp(16px, 2.2vw, 20px);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #setup-go:hover { background: #c94420; }
    #setup-go:active { transform: scale(0.97); }
    #setup-go:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }

    .setup-hint {
      font-size: clamp(11px, 1.5vw, 13px);
      color: var(--muted);
      text-align: center;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 540px) {
      #url-group { display: none; }
    }

    @media (min-width: 1200px) {
      #vol-slider { max-width: 280px; }
    }

    /* TV / 10-foot UI: increase all touch targets */
    @media (min-width: 1920px) {
      :root { --ctrl-size: 80px; }
      .ctrl-btn { border-radius: 16px; }
      #stream-url { font-size: 16px; border-radius: 14px; }
    }
  </style>
</head>
<body>

<!-- ── Setup screen (shown on first load if no URL) ── -->
<div id="setup-screen">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo-dot" style="width:14px;height:14px;border-radius:50%;background:#e8542a;flex-shrink:0;"></div>
    <span style="font-size:clamp(20px,3vw,28px);font-weight:800;letter-spacing:-0.3px;">GCStreamer</span>
  </div>
  <div class="setup-title">Enter Stream URL</div>
  <div class="setup-sub">Paste your HLS stream URL below to start watching live.</div>
  <input
    id="setup-url-input"
    type="url"
    inputmode="url"
    autocomplete="url"
    spellcheck="false"
    placeholder="https://example.com/stream/index.m3u8"
  />
  <button id="setup-go" tabindex="0">Watch Live</button>
  <div class="setup-hint">HLS (.m3u8) streams supported &nbsp;·&nbsp; Works on TV, phone, tablet</div>
</div>

<!-- ── Main app ── -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      GCStreamer
    </div>
    <div id="status-badge" class="loading">
      <div class="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </header>

  <div id="video-wrap">
    <video id="video" playsinline autoplay muted></video>

    <div id="overlay">
      <div class="overlay-icon">
        <!-- Play icon -->
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div id="overlay-msg">No stream loaded</div>
      <div id="overlay-sub">Enter a stream URL using the bar below</div>
    </div>
  </div>

  <div id="controls">
    <!-- Play/Pause -->
    <button class="ctrl-btn primary" id="btn-play" title="Play / Pause (Space)" tabindex="0" aria-label="Play or pause">
      <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <!-- Volume -->
    <div id="vol-group">
      <button class="ctrl-btn" id="btn-mute" id="vol-icon" title="Mute (M)" tabindex="0" aria-label="Mute or unmute">
        <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <svg id="icon-mute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l2 2L21 18.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <input id="vol-slider" type="range" min="0" max="1" step="0.02" value="1" aria-label="Volume" />
    </div>

    <!-- URL bar (hidden on very small screens) -->
    <div id="url-group">
      <input id="stream-url" type="url" inputmode="url" spellcheck="false" placeholder="https://…/stream.m3u8" tabindex="0" />
      <button class="ctrl-btn" id="btn-load" title="Load stream (Enter)" tabindex="0" aria-label="Load stream">
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
    </div>

    <div class="spacer"></div>

    <!-- Fullscreen -->
    <button class="ctrl-btn" id="btn-fs" title="Fullscreen (F)" tabindex="0" aria-label="Toggle fullscreen">
      <svg id="icon-expand" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      <svg id="icon-shrink" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── Elements ──
  const setupScreen  = document.getElementById('setup-screen');
  const setupInput   = document.getElementById('setup-url-input');
  const setupGo      = document.getElementById('setup-go');
  const video        = document.getElementById('video');
  const overlay      = document.getElementById('overlay');
  const overlayMsg   = document.getElementById('overlay-msg');
  const overlaySub   = document.getElementById('overlay-sub');
  const badge        = document.getElementById('status-badge');
  const statusText   = document.getElementById('status-text');
  const btnPlay      = document.getElementById('btn-play');
  const iconPlay     = document.getElementById('icon-play');
  const iconPause    = document.getElementById('icon-pause');
  const btnMute      = document.getElementById('btn-mute');
  const iconVol      = document.getElementById('icon-vol');
  const iconMuteIcon = document.getElementById('icon-mute');
  const volSlider    = document.getElementById('vol-slider');
  const streamUrl    = document.getElementById('stream-url');
  const btnLoad      = document.getElementById('btn-load');
  const btnFs        = document.getElementById('btn-fs');
  const iconExpand   = document.getElementById('icon-expand');
  const iconShrink   = document.getElementById('icon-shrink');

  let hls = null;
  let hideControlsTimer = null;

  // ── Persist URL across page loads ──
  const STORAGE_KEY = 'gcstreamer_url';

  function getSavedUrl() {
    try { return localStorage.getItem(STORAGE_KEY) || ''; } catch { return ''; }
  }

  function saveUrl(url) {
    try { localStorage.setItem(STORAGE_KEY, url); } catch {}
  }

  // ── Setup screen ──
  function showSetup() {
    setupScreen.classList.remove('hidden');
    setupInput.value = getSavedUrl();
    setTimeout(() => setupInput.focus(), 100);
  }

  function hideSetup() {
    setupScreen.classList.add('hidden');
  }

  setupGo.addEventListener('click', () => {
    const url = setupInput.value.trim();
    if (url) { loadStream(url); hideSetup(); }
  });

  setupInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') setupGo.click();
  });

  // ── Status badge ──
  function setStatus(state, text) {
    badge.className = state;
    statusText.textContent = text;
  }

  // ── Overlay ──
  function showOverlay(msg, sub) {
    overlayMsg.textContent = msg;
    overlaySub.textContent = sub || '';
    overlay.classList.remove('hidden');
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  // ── Load / play stream ──
  function loadStream(url) {
    if (!url) return;
    saveUrl(url);
    streamUrl.value = url;

    // Destroy existing HLS instance
    if (hls) { hls.destroy(); hls = null; }

    setStatus('loading', 'Connecting…');
    showOverlay('Loading stream…', url);

    if (Hls.isSupported()) {
      hls = new Hls({
        lowLatencyMode: true,
        backBufferLength: 30,
        maxBufferLength: 30,
        liveSyncDurationCount: 3,
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {
          // Autoplay blocked — unmute required
          video.muted = true;
          video.play();
        });
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          setStatus('error', 'Stream error');
          showOverlay('Stream unavailable', 'Check the URL or wait for the broadcast to start.');
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = url;
      video.play().catch(() => { video.muted = true; video.play(); });
    } else {
      setStatus('error', 'Unsupported');
      showOverlay('HLS not supported', 'Please use a modern browser (Chrome, Safari, Firefox).');
    }
  }

  // ── Video event listeners ──
  video.addEventListener('playing', () => {
    setStatus('live', 'LIVE');
    hideOverlay();
    updatePlayIcon();
  });

  video.addEventListener('pause', () => {
    setStatus('loading', 'Paused');
    updatePlayIcon();
  });

  video.addEventListener('waiting', () => {
    setStatus('loading', 'Buffering…');
  });

  video.addEventListener('ended', () => {
    setStatus('loading', 'Stream ended');
    showOverlay('Stream ended', 'The broadcast has finished.');
  });

  // ── Play / pause ──
  function togglePlay() {
    if (video.paused) { video.play(); } else { video.pause(); }
  }

  function updatePlayIcon() {
    iconPlay.style.display  = video.paused ? '' : 'none';
    iconPause.style.display = video.paused ? 'none' : '';
  }

  btnPlay.addEventListener('click', togglePlay);

  // ── Mute / volume ──
  function syncMuteIcon() {
    iconVol.style.display      = video.muted ? 'none' : '';
    iconMuteIcon.style.display = video.muted ? '' : 'none';
  }

  btnMute.addEventListener('click', () => {
    video.muted = !video.muted;
    syncMuteIcon();
    volSlider.value = video.muted ? 0 : video.volume;
  });

  volSlider.addEventListener('input', () => {
    video.volume = volSlider.value;
    video.muted  = volSlider.value == 0;
    syncMuteIcon();
  });

  // ── Load URL from controls bar ──
  function loadFromBar() {
    const url = streamUrl.value.trim();
    if (url) { loadStream(url); hideSetup(); }
    else     { showSetup(); }
  }

  btnLoad.addEventListener('click', loadFromBar);

  streamUrl.addEventListener('keydown', e => {
    if (e.key === 'Enter') loadFromBar();
  });

  // ── Fullscreen ──
  function toggleFs() {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
    }
  }

  btnFs.addEventListener('click', toggleFs);

  document.addEventListener('fullscreenchange', () => {
    const fs = !!document.fullscreenElement;
    iconExpand.style.display = fs ? 'none' : '';
    iconShrink.style.display = fs ? '' : 'none';
  });

  // ── Keyboard shortcuts (TV D-pad + desktop) ──
  document.addEventListener('keydown', e => {
    // Ignore when typing in an input
    if (e.target.tagName === 'INPUT') return;

    switch (e.key) {
      case ' ':
      case 'Enter':
      case 'MediaPlayPause':
        e.preventDefault(); togglePlay(); break;
      case 'f':
      case 'F':
        toggleFs(); break;
      case 'm':
      case 'M':
        video.muted = !video.muted; syncMuteIcon(); break;
      case 'ArrowUp':
        e.preventDefault();
        video.volume = Math.min(1, video.volume + 0.1);
        volSlider.value = video.volume;
        video.muted = false; syncMuteIcon(); break;
      case 'ArrowDown':
        e.preventDefault();
        video.volume = Math.max(0, video.volume - 0.1);
        volSlider.value = video.volume;
        if (video.volume === 0) video.muted = true; syncMuteIcon(); break;
      case 'ArrowLeft':
        e.preventDefault();
        if (video.seekable.length) video.currentTime = Math.max(0, video.currentTime - 10);
        break;
      case 'ArrowRight':
        e.preventDefault();
        if (video.seekable.length) video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
        break;
      case 'Escape':
        if (document.fullscreenElement) toggleFs(); break;
    }
  });

  // ── Init ──
  const DEFAULT_STREAM_URL = 'https://ee1408a02798.us-east-1.playback.live-video.net/api/video/v1/us-east-1.152250165346.channel.h55mwkc3MOzy.m3u8';

  (function init() {
    const savedUrl = getSavedUrl();
    // Check for ?url= query param (easy sharing / embedding)
    const params = new URLSearchParams(window.location.search);
    const qUrl   = params.get('url');

    const url = qUrl ? decodeURIComponent(qUrl) : (savedUrl || DEFAULT_STREAM_URL);
    hideSetup();
    loadStream(url);
  })();
</script>
</body>
</html>
